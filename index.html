<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andacht App - Bağlantılar</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }
        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            background-color: #ffffff;
            border: 3px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }
        .title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }
        .description {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 30px;
            font-weight: 400;
        }
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            color: #ffffff;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.3s ease;
            overflow: hidden;
        }
        .link-btn i {
            position: absolute;
            left: 20px;
            font-size: 20px;
        }
        .link-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .link-btn:active {
            transform: translateY(1px);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .footer {
            margin-top: auto;
            padding-top: 40px;
            font-size: 12px;
            color: #64748b;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://raw.githubusercontent.com/ezopmetlas-gif/Interactive-Resume/main/logo.png" alt="Andacht App Logo" class="profile-img">
        <h1 class="title">Andacht</h1>
        <p class="description">Namaz Vakitleri & Kıble</p>
        <div class="links-container">
            <a href="https://sites.google.com/view/andacht-namaz-gebet/ana-sayfa" target="_blank" class="link-btn">
                <i class="fa-solid fa-globe"></i>
                Web Sitemiz
            </a>
            <a href="https://play.google.com/store/apps/details?id=com.andacht_app.vakit&pli=1" target="_blank" class="link-btn">
                <i class="fa-brands fa-google-play"></i>
                Uygulamayı İndir (Android)
            </a>
            <a href="https://www.instagram.com/andacht.kontakt" target="_blank" class="link-btn">
                <i class="fa-brands fa-instagram"></i>
                Instagram
            </a>
        </div>
    </div>
    <div class="footer">
        © 2026 Andacht App
    </div>
</body>
</html>
